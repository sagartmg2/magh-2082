    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>

      }
      .parent {
        height: 600px;
        width: 602px;
        border: 1px solid;
        display: flex;
        /* gap:1rem; */
        flex-direction: row;
        justify-content: flex-start;
        justify-content: space-between;
        justify-content: end;
        justify-content: center;
        justify-content: start;
        align-items: start;
        align-items: end;
        align-items: center;
        position: relative;
        /* overflow: hidden; */
        flex-wrap: wrap;
      }

      .child {
        height: 200px;
        width: 200px;
        border: 1px solid;
        background-color: beige;
      }

    </style>
  </head>

    <br/>
    <br/>
