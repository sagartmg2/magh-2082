<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        box-sizing: border-box;
      }
      .parent {
        height: 400px;
        width: 600px;
        border: 1px solid;
        display: flex;
        gap: 1rem;
        flex-direction: row;
        justify-content: start;
        justify-content: flex-start;
        justify-content: space-between;
        justify-content: end;
        justify-content: center;
        align-items: start;
        align-items: end;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      .child {
        height: 200px;
        width: 200px;
        border: 1px solid;
      }

      .circle {
        height: 200px;
        width: 200px;
        background-color: cyan;
        opacity: 0.5;
        border-radius: 50%;
        position: absolute;
        top: -5rem;
        left: -5rem;
      }
    </style>
  </head>
  <body>
    <br />
    <br />
    <div class="parent">
      <div class="circle"></div>
      <div class="child">one</div>
      <div class="child">two</div>
    </div>
  </body>
</html>
