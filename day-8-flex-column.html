<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      * {
        box-sizing: border-box;
      }
      .parent {
        position: relative;
        overflow: hidden;
        height: 600px;
        width: 600px;
        border: 1px solid;
        display: flex;
        flex-direction: row;
        flex-direction: column;
        gap: 1rem;
        justify-content: center;
        align-items: center;
      }

      .child {
        height: 200px;
        width: 200px;
        border: 1px solid;
      }
    </style>
  </head>
  <body>
    <br />
    <br />
    <div class="parent">
      <div class="child">one</div>
      <div class="child">two</div>
    </div>
  </body>
</html>
